<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Background -->
  <circle cx="20" cy="20" r="19" fill="#111100" stroke="#ffee00" stroke-width="2"/>
  <!-- Three lightning bolts fanned out -->
  <!-- Left bolt (angled) -->
  <g transform="rotate(-20 14 20)">
    <polygon points="14,8 17,17 15,17 17,30 11,19 14,19 11,8" fill="#ffee00"/>
    <polygon points="14,9 16,17 15,17 16,29 12,20 14,20 12,9" fill="white" opacity="0.6"/>
  </g>
  <!-- Center bolt -->
  <polygon points="20,7 23,17 21,17 23,31 17,18 20,18 17,7" fill="#ffee00"/>
  <polygon points="20,8 22,17 21,17 22,30 18,19 20,19 18,8" fill="white" opacity="0.6"/>
  <!-- Right bolt (angled) -->
  <g transform="rotate(20 26 20)">
    <polygon points="26,8 29,17 27,17 29,30 23,19 26,19 23,8" fill="#ffee00"/>
    <polygon points="26,9 28,17 27,17 28,29 24,20 26,20 24,9" fill="white" opacity="0.6"/>
  </g>
  <text x="20" y="38" text-anchor="middle" font-size="7" fill="#ffee00" font-family="monospace">x3</text>
</svg>
